name: Deploy to Aliyun

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd backend && yarn install
          cd ../frontend && yarn install

      - name: Build backend
        run: |
          cd backend && yarn build

      - name: Build frontend
        run: |
          cd frontend && yarn build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Initialize server (first run)
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          export SSHPASS="$ALIYUN_PASSWORD"
          
          echo "🔍 检查服务器环境..."
          # 检查是否需要初始化（node 和 pm2 是否已安装）
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$ALIYUN_USER@$ALIYUN_HOST" "command -v pm2 >/dev/null 2>&1" || {
            echo "⚠️  服务器需要初始化..."
            
            # 上传初始化脚本
            sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              scripts/init-server-pm2.sh "$ALIYUN_USER@$ALIYUN_HOST:/tmp/init-server.sh"
            
            # 运行初始化脚本
            sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "$ALIYUN_USER@$ALIYUN_HOST" "bash /tmp/init-server.sh"
          }

      - name: Deploy to Aliyun server
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: |
          export SSHPASS="$ALIYUN_PASSWORD"
          
          REMOTE_DIR="/opt/hik-agent"
          
          echo "🚀 开始部署到 $ALIYUN_HOST..."
          
          # 创建远程目录
          echo "📁 创建远程目录..."
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$ALIYUN_USER@$ALIYUN_HOST" "mkdir -p $REMOTE_DIR/backend $REMOTE_DIR/frontend && chmod -R 755 $REMOTE_DIR"
          
          # 上传代码
          echo "📤 上传后端文件..."
          sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -r backend/dist "$ALIYUN_USER@$ALIYUN_HOST:$REMOTE_DIR/"
          
          echo "📤 上传后端配置..."
          sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            backend/package.json "$ALIYUN_USER@$ALIYUN_HOST:$REMOTE_DIR/backend/"
          
          echo "📤 上传前端文件..."
          sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -r frontend/dist "$ALIYUN_USER@$ALIYUN_HOST:$REMOTE_DIR/"
          
          echo "📤 上传 PM2 配置..."
          sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ecosystem.config.cjs "$ALIYUN_USER@$ALIYUN_HOST:$REMOTE_DIR/"
          
          # 在远程服务器启动服务
          echo "🔄 启动服务..."
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$ALIYUN_USER@$ALIYUN_HOST" << 'DEPLOY_CMD'
          set -e
          cd /opt/hik-agent
          
          echo "✓ 已连接到服务器"
          
          # 停止旧的进程
          echo "⛔ 停止旧的进程..."
          pm2 stop all 2>/dev/null || true
          pm2 delete all 2>/dev/null || true
          
          # 创建日志目录
          mkdir -p /var/log/hik
          
          # 启动新的进程
          echo "🚀 启动新的进程..."
          echo "📄 检查配置文件内容..."
          cat ecosystem.config.cjs
          echo "---"
          pm2 start ecosystem.config.cjs
          
          # 保存配置
          pm2 save
          
          # 等待服务就绪
          sleep 3
          
          # 验证服务
          echo "🔍 验证服务状态..."
          pm2 list
          
          # 检查后端
          if curl -s http://localhost:8000/health >/dev/null; then
              echo "✅ 后端服务正常"
          else
              echo "⚠️  后端服务未响应，检查日志:"
              pm2 logs hik-backend --lines 20
          fi
          
          echo "✅ 部署完成！"
          DEPLOY_CMD
          
          echo "✅ 部署成功！"
