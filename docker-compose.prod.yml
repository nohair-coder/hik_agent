version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hik-agent-backend
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - chroma
      - ollama
    networks:
      - hik-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hik-agent-frontend
    ports:
      - "1420:80"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - hik-network
    restart: unless-stopped

  # Ollama - LLM 和 Embedding 服务
  ollama:
    image: ollama/ollama:latest
    container_name: hik-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - hik-network
    restart: unless-stopped

  # ChromaDB - 向量数据库
  chroma:
    image: chromadb/chroma:latest
    container_name: hik-agent-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_HOST_TYPE=rest
    networks:
      - hik-network
    restart: unless-stopped

volumes:
  ollama-data:
    driver: local
  chroma-data:
    driver: local

networks:
  hik-network:
    driver: bridge
